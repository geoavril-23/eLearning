{% load static %}
<header class="header_section" style="padding: 0;">
  <div class="container-fluid">
    <nav class="navbar navbar-expand-lg custom_nav-container">
      <a class="navbar-brand" href="{% url 'index' %}" id="ooLogoLink" aria-label="OpenEduVerse — Accueil">
        <img
          src="{% static 'images/logo.png' %}"
          alt="Logo OpenEduVerse"
          id="ooLogoImg"
          class="oo-logo-img"
          style="height: 80px; width: 80px; object-fit: cover; border-radius: 50%; border: 3px solid #fec913; background: white; padding: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"
        />
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" style="border: 1px solid #fec913;">
        <i class="fas fa-bars" style="color: #fec913;"></i>
      </button>
      <div class="collapse navbar-collapse ml-auto" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
            <a class="nav-link nav-glass" href="{% url 'index' %}">Accueil</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'course' %}active{% endif %}">
            <a class="nav-link nav-glass" href="{% url 'course' %}">Cours</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'a_propos' %}active{% endif %}">
            <a class="nav-link nav-glass" href="{% url 'a_propos' %}">À propos</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">
            <a class="nav-link nav-glass" href="{% url 'contact' %}">Contact</a>
          </li>
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link nav-glass" href="{% url 'dashboard' %}">Tableau de bord</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-glass" href="{% url 'admin_logout' %}"
              style="color: #fec913 !important; font-weight: 700;"><i class="fas fa-sign-out-alt"></i></a>
          </li>
          {% else %}
          <li class="nav-item {% if request.resolver_match.url_name == 'admin_login' %}active{% endif %}">
            <a class="nav-link btn-yellow-glass ml-3"
              style="width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50% !important; padding: 0 !important; margin-top: 6px;"
              href="{% url 'admin_login' %}" title="Connexion / Inscription">
              <i class="fas fa-user-circle fa-sm"></i>
            </a>
          </li>
          {% endif %}
        </ul>
      </div>
    </nav>
  </div>
</header>
