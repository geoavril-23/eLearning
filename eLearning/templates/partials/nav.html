{% load static %}
<header class="header_section">
  <div class="container-fluid">
    <nav class="navbar navbar-expand-lg custom_nav-container">
      <a class="navbar-brand" href="{% url 'index' %}">
        <img src="{% static 'images/logo.png' %}" alt="logo" style="max-height:100px; width:auto;">
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse ml-auto" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item {% if request.resolver_match.url_name == 'index' %}active{% endif %}">
            <a class="nav-link" href="{% url 'index' %}">Accueil</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'course' %}active{% endif %}">
            <a class="nav-link" href="{% url 'course' %}">Cours</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'a_propos' %}active{% endif %}">
            <a class="nav-link" href="{% url 'a_propos' %}">À propos</a>
          </li>
          <li class="nav-item {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">
            <a class="nav-link" href="{% url 'contact' %}">Contact</a>
          </li>
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">Tableau de bord</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'admin_logout' %}" style="color: #fec913 !important; font-weight: 700;">DÉCONNEXION ({{ user.nom|upper }})</a>
          </li>
          {% else %}
          <li class="nav-item {% if request.resolver_match.url_name == 'admin_login' %}active{% endif %}">
            <a class="nav-link" href="{% url 'admin_login' %}">Connexion/Inscription</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </nav>
  </div>
</header>
